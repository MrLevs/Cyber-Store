<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber || Product Details</title>
  </head>
  <body>
    <include src="chunk/header.html"></include>
    <div class="breadcrumbs">
      <div class="breadcrumbs__container container">
        <div class="breadcrumbs__bg">
          <div class="breadcrumbs__inner container-m">
            <nav class="breadcrumbs__nav" aria-label="breadcrumbs">
              <ul class="breadcrumbs__list">
                <li class="breadcrumbs__item">
                  <a href="#" class="breadcrumbs__link">Home</a>
                </li>
                <li class="breadcrumbs__item">
                  <a href="#" class="breadcrumbs__link">Catalog</a>
                </li>
                <li class="breadcrumbs__item">
                  <a href="#" class="breadcrumbs__link">Smartphones</a>
                </li>
                <li class="breadcrumbs__item">
                  <a href="#" class="breadcrumbs__link">Apple</a>
                </li>
                <li class="breadcrumbs__item">
                  <a href="#" class="breadcrumbs__link">iPhone 14 Pro Max</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
    <main class="main">
      <section class="info">
        <div class="info__container container">
          <div class="info__bg">
            <div class="info__inner">
            <h1 class="info__title">Apple iPhone 14 Pro Max</h1>
            <div class="info__content"></div>
            <div class="info__info">
              <div class="info__info-box">
                <div class="info__info-picture">
                  <svg class="info__info-svg" width="24" height="24" viewBox="0 0 24 24">
                    <use href="/images/sprite-icon.svg#truck" />
                  </svg>
                </div>
                <div class="info__info-block">
                  <h2 class="info__info-title">Free Delivery</h2>
                  <p class="info__info-text">1-2 day</p>
                </div>
              </div>
              <div class="info__info-box">
                <div class="info__info-picture">
                  <svg class="info__info-svg" width="24" height="24" viewBox="0 0 24 24">
                    <use href="/images/sprite-icon.svg#stock" />
                  </svg>
                </div>
                <div class="info__info-block">
                  <h2 class="info__info-title">In Stock</h2>
                  <p class="info__info-text">Today</p>
                </div>
              </div>
              <div class="info__info-box">
                <div class="info__info-picture">
                  <svg class="info__info-svg" width="24" height="24" viewBox="0 0 24 24">
                    <use href="/images/sprite-icon.svg#verify" />
                  </svg>
                </div>
                <div class="info__info-block">
                  <h2 class="info__info-title">Guaranteed</h2>
                  <p class="info__info-text">1 year</p>
                </div>
              </div>
            </div>
          </div>
          </div>
        </div>
      </section>
      <section class="details"></section>
      <section class="reviews"></section>
      <section class="discount">
        <div class="discount__container container">
          <div class="discount__bg">
            <div class="discount__inner container-m">
              <h2 class="title">Related Products</h2>
              <div id="related" class="discount__box"></div>
            </div>
          </div>
      </section>
    </main>
    <include src="chunk/footer.html"></include>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
